name: Windows Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Build Windows Portable EXE
        run: npm run dist:win

      - name: Archive win-unpacked
        shell: pwsh
        run: Compress-Archive -Path dist/win-unpacked/* -DestinationPath dist/PinShot-${{ github.ref_name || 'dev' }}-win-unpacked.zip -Force

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pinshot-windows-build
          path: |
            dist/*.exe
            dist/*win-unpacked.zip

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/*win-unpacked.zip
          generate_release_notes: true

