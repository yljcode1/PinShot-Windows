<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Capture</title>
    <link rel="stylesheet" href="./capture.css" />
  </head>
  <body>
    <div id="capture-root" class="capture-root">
      <img id="screenshot" class="screenshot" alt="" />
      <div class="overlay-mask"></div>
      <div id="selection" class="selection hidden"></div>
      <div class="hud">
        <span id="mode-label">Capture Area</span>
        <span>Drag to capture. Press Esc to cancel.</span>
      </div>
    </div>
    <script src="./capture.js"></script>
  </body>
</html>
