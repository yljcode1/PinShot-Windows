<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pin</title>
    <link rel="stylesheet" href="./pin.css" />
  </head>
  <body>
    <div id="pin-root" class="pin-root">
      <div id="surface" class="surface">
        <div id="visual-layer" class="visual-layer">
          <img id="base-image" class="base-image" alt="" />
          <canvas id="annotation-canvas" class="overlay-canvas"></canvas>
          <canvas id="text-canvas" class="overlay-canvas"></canvas>
        </div>

        <div id="toolbar" class="toolbar hidden">
          <button data-action="toggle-inspector" title="Text Panel">Txt</button>
          <button data-tool="none" title="Normal">Move</button>
          <button data-tool="selectText" title="Select Text">OCR</button>
          <button data-tool="pen" title="Pen">Pen</button>
          <button data-tool="rectangle" title="Rectangle">Rect</button>
          <button data-tool="arrow" title="Arrow">Arrow</button>
          <button data-tool="text" title="Text">Text</button>
          <button data-tool="mosaic" title="Mosaic">Mosaic</button>
          <button data-color="#ef3b34" class="color-swatch red" title="Red"></button>
          <button data-color="#2f86ff" class="color-swatch blue" title="Blue"></button>
          <button data-action="undo" title="Undo">Undo</button>
          <button data-action="clear" title="Clear">Clear</button>
          <button data-action="copy" title="Copy">Copy</button>
          <button data-action="save" title="Save">Save</button>
          <button data-action="close" title="Close">Close</button>
        </div>

        <div id="chooser" class="chooser hidden">
          <button data-chooser="quick-edit">Quick Edit</button>
          <button data-chooser="pin">Pin</button>
          <button data-chooser="copy">Copy</button>
        </div>

        <div id="inspector" class="inspector hidden">
          <div class="inspector-head">
            <div>
              <strong>Text Panel</strong>
              <small>OCR, translation, and pin opacity</small>
            </div>
            <button id="close-inspector" class="ghost">Close</button>
          </div>

          <div class="inspector-group">
            <div class="group-head">
              <strong>OCR</strong>
              <div class="group-actions">
                <button id="copy-text" class="ghost">Copy</button>
                <button id="translate-text" class="ghost">Translate</button>
              </div>
            </div>
            <pre id="ocr-text" class="text-box">Recognizing text...</pre>
          </div>

          <div id="translation-group" class="inspector-group hidden">
            <div class="group-head">
              <strong id="translation-label">Translation</strong>
            </div>
            <pre id="translated-text" class="text-box">Translated text will appear here.</pre>
          </div>

          <div class="inspector-group">
            <div class="group-head">
              <strong>Opacity</strong>
              <span id="opacity-label">96%</span>
            </div>
            <input id="opacity-slider" type="range" min="35" max="100" value="96" />
          </div>
        </div>

        <div id="toast" class="toast hidden"></div>
      </div>
    </div>

    <script src="./pin.js"></script>
  </body>
</html>
